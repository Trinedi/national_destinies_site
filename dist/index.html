<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>National Destinies, Formables Atlas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="app.css" />
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <header>
      <h1>National Destinies</h1>
      <div class="subtitle">Formables Atlas</div>
      <a class="workshop-link" href="https://steamcommunity.com/sharedfiles/filedetails/?id=3668193813"
         target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
          <path fill="currentColor" d="M11.94 0C5.7 0 .58 4.66.04 10.74l6.42 2.65a3.41 3.41 0 0 1 1.93-.59l2.85-4.13v-.06a4.55 4.55 0 1 1 4.54 4.55h-.1l-4.07 2.9a3.42 3.42 0 0 1-6.81.36l-4.59-1.9C1.62 19.96 6.34 24 11.94 24a12 12 0 0 0 0-24M7.55 18.21l-1.47-.6a2.58 2.58 0 0 0 1.34 1.51 2.6 2.6 0 0 0 3.42-1.39 2.59 2.59 0 0 0-3.79-3.13l1.51.62c.93.39 1.36 1.45.97 2.38a1.81 1.81 0 0 1-2.38.97zm10.39-7.81a3.03 3.03 0 0 0-3.03-3.03 3.03 3.03 0 0 0-3.03 3.03 3.03 3.03 0 0 0 3.03 3.04 3.03 3.03 0 0 0 3.03-3.04m-5.3-.02c0-1.26 1.02-2.28 2.28-2.28 1.27 0 2.29 1.02 2.29 2.28 0 1.27-1.02 2.29-2.29 2.29s-2.28-1.02-2.28-2.29"/>
        </svg>
        Subscribe on Steam Workshop
      </a>
    </header>
    <div id="search-row">
      <input type="search" id="search" placeholder="Filter formables..." autocomplete="off" />
      <div id="level-filter" role="group" aria-label="Levels">
        <span class="lf-label">Levels</span>
        <label><input type="checkbox" data-lvl="1" checked /> 1</label>
        <label><input type="checkbox" data-lvl="2" checked /> 2</label>
        <label><input type="checkbox" data-lvl="3" checked /> 3</label>
        <label><input type="checkbox" data-lvl="4" checked /> 4</label>
        <label><input type="checkbox" data-lvl="5" checked /> 5</label>
      </div>
      <div id="source-filter" role="group" aria-label="Source">
        <span class="lf-label">Type</span>
        <label><input type="checkbox" data-src="mod_new" checked /> New</label>
        <label><input type="checkbox" data-src="enhanced" checked /> Enhanced</label>
      </div>
    </div>
    <div id="formables-list" role="listbox" aria-label="Formable countries"></div>
  </aside>
  <main id="map-pane">
    <div id="map"></div>
    <div id="hover-card" hidden></div>
    <section id="detail" hidden>
      <header>
        <h2 id="detail-name"></h2>
        <button id="detail-close" aria-label="Close detail panel">&times;</button>
      </header>
      <div id="detail-body"></div>
    </section>
  </main>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
