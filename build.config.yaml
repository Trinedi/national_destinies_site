mod_root: ~/Projects/national_destinies
eu5_game_root: ~/.local/share/Steam/steamapps/common/Europa Universalis V/game

paths:
  locations_png: in_game/map_data/locations.png
  named_locations: in_game/map_data/named_locations/00_default.txt
  definitions: in_game/map_data/definitions.txt
  default_map: in_game/map_data/default.map

map:
  equator_y: 3340
  wrap_x: true
  zoom_levels: 6
  tile_size: 256

build:
  data_dir: data           # intermediate artifacts (basemap.png, caches)
  web_data_dir: dist/data  # frontend-consumed JSON outputs
  dist_dir: dist
  cache_dir: data/cache

# Some vanilla formables are deliberately defined with empty geography
# (potential = { always = no }, regions = {}) because they are formed by
# scripted events only. The atlas needs *something* to tint, so we patch
# in a sensible default territory per tag here. Only applied when the
# formable has no continents / sub_continents / regions / areas /
# provinces / locations / must_own of its own.
territory_overrides:
  JAP:
    regions: [japan_region]
